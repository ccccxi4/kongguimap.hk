<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>港版窮鬼地圖 — 香港平價美食地圖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #DC2626;
      --gold: #CA8A04;
      --dark: #1C1917;
      --text: #292524;
      --muted: #78716C;
      --border: #E7E5E4;
      --white: #FFFFFF;
      --card-bg: #FAFAF9;
      --green: #16A34A;
    }
    body { font-family: 'Noto Sans HK', sans-serif; background: var(--white); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    header { background: var(--white); color: var(--dark); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid var(--border); position: relative; z-index: 200; }
    .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 24px; }
    .badge { background: var(--red); color: var(--white); font-size: 12px; padding: 4px 10px; border-radius: 12px; }

    /* Stats */
    .stats { background: #FEF9C3; padding: 8px 16px; font-size: 12px; color: #92400E; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; flex-direction: column; }
    .stats-header { display: flex; gap: 12px; align-items: center; width: 100%; }
    .stats-toggle { 
      background: white; 
      border: 1px solid #FDE68A; 
      padding: 4px 12px; 
      border-radius: 12px; 
      cursor: pointer; 
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .stats-toggle:hover { background: #FEF3C7; }
    .district-tags-container { 
      display: flex; 
      gap: 6px; 
      flex-wrap: wrap; 
      flex: 1;
      overflow: hidden;
      transition: max-height 0.3s ease;
      max-height: 200px;
    }
    .district-tags-container.collapsed { max-height: 0; }
    .district-tag { 
      background: white; 
      border: 1px solid #FDE68A; 
      padding: 3px 10px; 
      border-radius: 12px; 
      cursor: pointer; 
      font-size: 11px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .district-tag:hover { background: #FEF3C7; border-color: #F59E0B; }
    .district-tag.active { background: var(--green); color: white; border-color: var(--green); }

    /* Submit Button - Fixed */
    .submit-btn { 
      position: fixed; 
      bottom: 20px; 
      right: 20px; 
      background: var(--green); 
      color: white; 
      border: none; 
      padding: 14px 20px; 
      border-radius: 50px; 
      font-size: 14px; 
      font-weight: 700; 
      cursor: pointer; 
      box-shadow: 0 4px 12px rgba(22, 163, 74, 0.4);
      z-index: 300;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .submit-btn:hover { background: #15803D; }
    .submit-btn svg { width: 18px; height: 18px; }

    /* Main Layout */
    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* Sidebar */
    .sidebar { 
      width: 360px; 
      background: var(--card-bg); 
      border-right: 1px solid var(--border); 
      display: flex; 
      flex-direction: column;
      transition: transform 0.3s ease;
    }
    .search { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--white); }
    .search input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; }
    .list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .item:hover { background: var(--white); }
    .item.active { background: #FEE2E2; border-left: 3px solid var(--red); }
    .item-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .item-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .item-price { color: var(--red); font-weight: 700; }
    .nav-btn-small {
      background: var(--green);
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      margin-left: auto;
    }

    /* Map */
    #map { flex: 1; z-index: 1; }

    /* Popup */
    .leaflet-popup-content-wrapper { border-radius: 12px !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 14px 16px !important; width: 260px !important; }
    .popup-name { font-weight: 700; margin-bottom: 6px; font-size: 15px; }
    .popup-addr { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }
    .popup-price { color: var(--red); font-weight: 700; margin-bottom: 10px; }
    .popup-nav-btn {
      background: var(--green);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .popup-nav-btn:hover { background: #15803D; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--green); }
    .form-submit {
      background: var(--green);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .form-submit:hover { background: #15803D; }
    .form-success {
      text-align: center;
      padding: 40px 20px;
    }
    .form-success-icon { font-size: 48px; margin-bottom: 16px; }
    .form-success-text { font-size: 16px; color: var(--text); }

    /* Mobile Optimizations */
    @media (max-width: 768px) {
      header { height: 50px; padding: 0 12px; }
      .logo { font-size: 16px; }
      .badge { font-size: 11px; padding: 3px 8px; }
      .stats { padding: 6px 12px; font-size: 11px; gap: 10px; }
      
      .sidebar { 
        position: absolute; 
        bottom: 0; 
        left: 0; 
        right: 0; 
        height: 45%; 
        width: 100%;
        z-index: 100; 
        border-right: none; 
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
      }
      #map { height: 55%; }
      
      .item { padding: 12px 14px; }
      .item-name { font-size: 14px; }
      
      .submit-btn {
        bottom: calc(45% + 16px);
        right: 12px;
        padding: 12px 16px;
        font-size: 13px;
      }
      
      .leaflet-popup-content { width: 220px !important; }
    }
    
    @media (max-width: 380px) {
      .sidebar { height: 50%; }
      #map { height: 50%; }
      .submit-btn { bottom: calc(50% + 12px); }
    }
  </style>
</head>
<body>
<header>
  <div class="logo"><span class="logo-icon">🍜</span> 港版窮鬼地圖</div>
  <span class="badge">≤$50</span>
</header>

<div class="stats">
  <div class="stats-header">
    <span class="stats-toggle" onclick="toggleDistricts()">
      <span id="toggleIcon">▼</span>
      <span id="toggleText">收起區域</span>
    </span>
    <span style="white-space: nowrap;">收錄 <strong id="count">949</strong> 間</span>
    <button onclick="locateUser()" style="background:var(--green);color:white;border:none;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;white-space: nowrap;margin-left:auto;">📍 定位我</button>
  </div>
  <div class="district-tags-container" id="districtTagsContainer">
    <div class="district-tags" id="districtTags"></div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="search">
      <input type="text" id="search" placeholder="搜索餐廳名稱或類型..." />
    </div>
    <div class="list" id="list"></div>
  </div>
  <div id="map"></div>
</div>

<!-- Submit Button -->
<button class="submit-btn" onclick="openModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M12 5v14M5 12h14"/>
  </svg>
  提交餐廳
</button>

<!-- Location Permission Modal -->
<div class="modal-overlay" id="locationModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📍 需要定位权限</div>
      <button class="modal-close" onclick="closeLocationModal()">&times;</button>
    </div>
    <div style="margin-bottom: 20px;">
      <p style="margin-bottom: 16px; line-height: 1.6;">为了显示您附近的餐厅，需要获取您的位置信息。</p>
      
      <div style="background: #F5F5F4; padding: 16px; border-radius: 10px; margin-bottom: 16px;">
        <p style="font-weight: 600; margin-bottom: 12px; font-size: 13px; color: #78716C;">请按以下步骤开启：</p>
        
        <div style="margin-bottom: 12px;">
          <p style="font-weight: 600; font-size: 13px; margin-bottom: 4px;">📱 iPhone/iPad</p>
          <p style="font-size: 12px; color: #57534E;">设置 → Safari → 位置 → 允许</p>
        </div>
        
        <div style="margin-bottom: 12px;">
          <p style="font-weight: 600; font-size: 13px; margin-bottom: 4px;">🤖 Android</p>
          <p style="font-size: 12px; color: #57534E;">设置 → 应用 → 浏览器 → 权限 → 位置 → 允许</p>
        </div>
        
        <div>
          <p style="font-weight: 600; font-size: 13px; margin-bottom: 4px;">💻 电脑浏览器</p>
          <p style="font-size: 12px; color: #57534E;">点击地址栏左侧的 🔒 图标 → 网站设置 → 位置 → 允许</p>
        </div>
      </div>
      
      <p style="font-size: 12px; color: #78716C; margin-bottom: 16px;">开启后点击下方的"重新定位"按钮</p>
    </div>
    <button class="form-submit" onclick="retryLocate()">重新定位</button>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">提交窮鬼餐廳</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="submitForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label class="form-label">餐廳名稱 *</label>
        <input type="text" class="form-input" name="name" required placeholder="例如：勝記茶餐廳">
      </div>
      <div class="form-group">
        <label class="form-label">類型 *</label>
        <select class="form-select" name="type" required>
          <option value="">請選擇</option>
          <option value="茶餐廳">茶餐廳</option>
          <option value="粥粉麵">粥粉麵</option>
          <option value="快餐">快餐</option>
          <option value="點心">點心</option>
          <option value="燒臘">燒臘</option>
          <option value="雲吞麵">雲吞麵</option>
          <option value="餃子">餃子</option>
          <option value="越南菜">越南菜</option>
          <option value="泰國菜">泰國菜</option>
          <option value="日本菜">日本菜</option>
          <option value="台灣菜">台灣菜</option>
          <option value="中東菜">中東菜</option>
          <option value="西餐">西餐</option>
          <option value="咖啡廳">咖啡廳</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">地址 *</label>
        <input type="text" class="form-input" name="address" required placeholder="例如：旺角通菜街123號">
      </div>
      <div class="form-group">
        <label class="form-label">平均消費 (HKD) *</label>
        <input type="number" class="form-input" name="price" required min="10" max="100" placeholder="例如：40">
      </div>
      <div class="form-group">
        <label class="form-label">推薦菜式</label>
        <input type="text" class="form-input" name="recommend" placeholder="例如：叉燒飯、奶茶">
      </div>
      <div class="form-group">
        <label class="form-label">備註</label>
        <textarea class="form-textarea" name="notes" placeholder="其他想補充的資訊..."></textarea>
      </div>
      <button type="submit" class="form-submit">提交</button>
    </form>
    <div id="successMessage" class="form-success" style="display: none;">
      <div class="form-success-icon">✅</div>
      <div class="form-success-text">感謝你的提交！<br>我們會盡快審核並加入地圖。</div>
      <button class="form-submit" style="margin-top: 20px;" onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

let map, markers = {}, activeId = null;

function init() {
  // 地图
  map = L.map('map').setView([22.29, 114.15], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 标记
  RESTAURANTS.forEach(r => {
    const marker = L.marker([r.lat, r.lng]).addTo(map);
    marker.bindPopup(createPopupContent(r));
    marker.on('click', () => select(r.id));
    markers[r.id] = marker;
  });

  // 渲染区域标签
  renderDistrictTags();

  renderList(RESTAURANTS);

  // 搜索
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    const filtered = RESTAURANTS.filter(r => 
      r.name.toLowerCase().includes(q) || 
      r.address.toLowerCase().includes(q) ||
      r.type.includes(q)
    );
    renderList(filtered);
  });
}

let districtsExpanded = true;

  districtsExpanded = !districtsExpanded;
  const container = document.getElementById('districtTagsContainer');
  const icon = document.getElementById('toggleIcon');
  const text = document.getElementById('toggleText');
  
  if (districtsExpanded) {
    container.classList.remove('collapsed');
    icon.textContent = '▼';
    text.textContent = '收起區域';

    container.classList.add('collapsed');
    icon.textContent = '▶';

  }
}

function renderList(items) {
  const list = document.getElementById('list');
  list.innerHTML = items.map(r => `
    <div class="item ${r.id === activeId ? 'active' : ''}" data-id="${r.id}">
      <div class="item-name">${r.name}</div>
      <div class="item-meta">
        <span>${r.type}</span>
        <span class="item-price">$${r.price}</span>
        <span>⭐${r.rating}</span>
        ${r.distance ? `<span style="color:var(--green);font-size:11px;">${Math.round(r.distance)}m</span>` : ''}
        <button class="nav-btn-small" onclick="event.stopPropagation(); openNavigation(${r.lat}, ${r.lng}, '${r.name.replace(/'/g, "\\'")}')">導航</button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => select(parseInt(el.dataset.id)));
  });

  document.getElementById('count').textContent = items.length;
}

function select(id) {
  activeId = id;
  const r = RESTAURANTS.find(x => x.id === id);
  if (!r) return;

  map.flyTo([r.lat, r.lng], 17, { duration: 0.5 });
  markers[id].openPopup();
  renderList(RESTAURANTS);
  
  // Mobile: scroll to item
  const item = document.querySelector(`.item[data-id="${id}"]`);
  if (item) item.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function openNavigation(lat, lng, name) {
  // Try Google Maps first, fallback to Apple Maps on iOS
  const googleUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&destination_place_id=${encodeURIComponent(name)}`;
  const appleUrl = `http://maps.apple.com/?daddr=${lat},${lng}&q=${encodeURIComponent(name)}`;
  
  // Check if iOS
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  
  if (isIOS) {
    window.open(appleUrl, '_blank');
  } else {
    window.open(googleUrl, '_blank');
  }
}

// 定位用户位置并显示附近餐厅
function locateUser() {
  if (!navigator.geolocation) {
    alert('您的浏览器不支持地理定位功能');
    return;
  }
  
  navigator.geolocation.getCurrentPosition(
    (position) => {
      const userLat = position.coords.latitude;
      const userLng = position.coords.longitude;
      
      // 计算用户与所有餐厅的距离
      const restaurantsWithDist = RESTAURANTS.map(r => {
        const dist = calcDistance(userLat, userLng, r.lat, r.lng);
        return { ...r, distance: dist };
      });
      
      // 按距离排序
      restaurantsWithDist.sort((a, b) => a.distance - b.distance);
      
      // 找到最近的餐厅
      const nearest = restaurantsWithDist[0];
      
      // 移动地图到用户位置
      map.flyTo([userLat, userLng], 15, { duration: 1 });
      
      // 添加用户位置标记
      if (window.userMarker) {
        map.removeLayer(window.userMarker);
      }
      window.userMarker = L.marker([userLat, userLng], {
        icon: L.divIcon({
          className: 'user-location-marker',
          html: '<div style="background:#16A34A;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>',
          iconSize: [22, 22],
          iconAnchor: [11, 11]
        })
      }).addTo(map);
      window.userMarker.bindPopup('您的位置').openPopup();
      
      // 显示附近餐厅列表
      renderList(restaurantsWithDist.slice(0, 20));
      
      // 提示用户
      setTimeout(() => {
        alert(`找到您附近最近的餐厅：${nearest.name}\n距离：${Math.round(nearest.distance)}米\n地址：${nearest.address}`);
      }, 1000);
    },
    (error) => {
      if (error.code === error.PERMISSION_DENIED) {
        openLocationModal();
      } else {
        let msg = '无法获取您的位置';
        switch(error.code) {
          case error.POSITION_UNAVAILABLE:
            msg = '位置信息不可用，请检查GPS是否开启';
            break;
          case error.TIMEOUT:
            msg = '定位超时，请重试';
            break;
        }
        alert(msg);
      }
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

// 计算两点之间的距离（米）
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad;
  const dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * rad) * Math.cos(lat2 * rad) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Location Permission Modal functions
function openLocationModal() {
  document.getElementById('locationModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLocationModal() {
  document.getElementById('locationModal').classList.remove('active');
  document.body.style.overflow = '';
}

function retryLocate() {
  closeLocationModal();
  // 短暂延迟后重新尝试定位
  setTimeout(() => {
    locateUser();
  }, 300);
}

// Modal functions
function openModal() {
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
  // Reset form
  document.getElementById('submitForm').style.display = 'block';
  document.getElementById('successMessage').style.display = 'none';
  document.getElementById('submitForm').reset();
}

function handleSubmit(e) {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  
  // Store submission (in real app, send to server)
  const submissions = JSON.parse(localStorage.getItem('restaurantSubmissions') || '[]');
  submissions.push({
    ...data,
    submittedAt: new Date().toISOString(),
    id: Date.now()
  });
  localStorage.setItem('restaurantSubmissions', JSON.stringify(submissions));
  
  // Show success
  document.getElementById('submitForm').style.display = 'none';
  document.getElementById('successMessage').style.display = 'block';
}

// Close modal on outside click
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('locationModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('locationModal')) closeLocationModal();
});

init();
</script>
