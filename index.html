    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --red: #DC2626;
      --gold: #CA8A04;
      --dark: #1C1917;
      --text: #292524;
      --muted: #78716C;
      --border: #E7E5E4;
      --white: #FFFFFF;
      --card-bg: #FAFAF9;
    }
    body { font-family: 'Noto Sans HK', sans-serif; background: var(--white); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header - 白色 */
    header { background: var(--white); color: var(--dark); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logo-icon { font-size: 24px; }
    .badge { background: var(--red); color: var(--white); font-size: 12px; padding: 4px 10px; border-radius: 12px; }

    /* Stats */
    .stats { background: #FEF9C3; padding: 8px 16px; font-size: 12px; color: #92400E; display: flex; gap: 16px; }

    /* Main */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar { width: 320px; background: var(--card-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .search { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--white); }
    .search input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; }
    .list { flex: 1; overflow-y: auto; }
    .item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    .item:hover { background: var(--white); }
    .item.active { background: #FEE2E2; border-left: 3px solid var(--red); }
    .item-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .item-meta { font-size: 12px; color: var(--muted); display: flex; gap: 8px; }
    .item-price { color: var(--red); font-weight: 700; }

    /* Map */
    #map { flex: 1; }

    /* Popup */
    .leaflet-popup-content-wrapper { border-radius: 12px !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 12px 14px !important; width: 200px !important; }
    .popup-name { font-weight: 700; margin-bottom: 4px; }
    .popup-addr { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .popup-price { color: var(--red); font-weight: 700; }

    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; z-index: 100; border-right: none; border-top: 1px solid var(--border); }
      #map { height: 60%; }
    }

let map, markers = {}, activeId = null;

function init() {
  // 地图
  map = L.map('map').setView([22.29, 114.15], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // 标记
  RESTAURANTS.forEach(r => {
    const marker = L.marker([r.lat, r.lng]).addTo(map);
    marker.bindPopup(`
      <div class="popup-name">${r.name}</div>
      <div class="popup-addr">${r.address}</div>
      <div class="popup-price">$${r.price} · ${r.type} · ⭐${r.rating}</div>
    `);
    marker.on('click', () => select(r.id));
    markers[r.id] = marker;
  });

  renderList(RESTAURANTS);

  // 搜索
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    const filtered = RESTAURANTS.filter(r => 
      r.name.toLowerCase().includes(q) || 
      r.address.toLowerCase().includes(q) ||
      r.type.includes(q)
    );
    renderList(filtered);
  });
}

function renderList(items) {
  const list = document.getElementById('list');
  list.innerHTML = items.map(r => `
    <div class="item ${r.id === activeId ? 'active' : ''}" data-id="${r.id}">
      <div class="item-name">${r.name}</div>
      <div class="item-meta">
        <span>${r.type}</span>
        <span class="item-price">$${r.price}</span>
        <span>⭐${r.rating}</span>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => select(parseInt(el.dataset.id)));
  });

  document.getElementById('count').textContent = items.length;
}

function select(id) {
  activeId = id;
  const r = RESTAURANTS.find(x => x.id === id);
  if (!r) return;

  map.flyTo([r.lat, r.lng], 17, { duration: 0.5 });
  markers[id].openPopup();
  renderList(RESTAURANTS);
}

init();
